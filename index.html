<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Action Network Control — Stream Craft Studio</title>
    <style>
      :root {
        --bg: #0f1419;
        --panel: #1a2332;
        --border: #2d3a4f;
        --text: #e8edf4;
        --muted: #8b9cb3;
        --accent: #3b82f6;
        --warn: #f59e0b;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text);
        font-size: 13px;
        line-height: 1.4;
      }
      .app { max-width: 760px; margin: 0 auto; padding: 16px; }
      h1 { font-size: 15px; font-weight: 600; margin: 0 0 4px; }
      .subtitle { color: var(--muted); margin: 0 0 20px; font-size: 12px; }
      .status {
        padding: 8px 12px;
        border-radius: 6px;
        margin-bottom: 16px;
        font-size: 12px;
        background: var(--panel);
        border: 1px solid var(--border);
      }
      .status.connected { border-color: #22c55e; }
      .status.warn { border-color: var(--warn); color: #fcd34d; }
      section {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 14px;
        margin-bottom: 12px;
      }
      section h2 {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        margin: 0 0 12px;
        font-weight: 600;
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: flex-end;
        margin-bottom: 10px;
      }
      .row:last-child { margin-bottom: 0; }
      label {
        display: flex;
        flex-direction: column;
        gap: 4px;
        font-size: 11px;
        color: var(--muted);
        min-width: 120px;
        flex: 1;
      }
      select, input[type="text"] {
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 6px 8px;
        border-radius: 4px;
        font-size: 13px;
        width: 100%;
      }
      .game-count { display: flex; gap: 8px; }
      .game-count button {
        flex: 1;
        padding: 10px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--text);
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
      }
      .game-count button.active {
        border-color: var(--accent);
        background: #1e3a5f;
        color: #93c5fd;
      }
      .game-panel { display: none; }
      .game-panel.visible { display: block; }
      .hidden { display: none !important; }
      .inline-check {
        flex-direction: row;
        align-items: center;
        gap: 8px;
        min-width: auto;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <h1>Action Network Control</h1>
      <p class="subtitle">Action Network payload for Stream Craft Studio</p>
      <div id="connection-status" class="status">Loading games…</div>

      <section id="games-number-section">
        <h2>Number of games</h2>
        <div class="game-count" id="game-count-buttons">
          <button type="button" data-count="1">1</button>
          <button type="button" data-count="2">2</button>
          <button type="button" data-count="3">3</button>
          <button type="button" data-count="4">4</button>
        </div>
      </section>

      <div id="games-container"></div>

      <section id="transition-section">
        <h2>Transition</h2>
        <div class="row">
          <label class="inline-check">
            <input type="checkbox" id="is-active-transition" />
            Active
          </label>
          <label>
            Type
            <select id="transition-type">
              <option value="transition_text">Text</option>
              <option value="transition_team">Team</option>
            </select>
          </label>
        </div>
        <div id="transition-options">
          <div class="row">
            <label id="transition-text-wrap">
              Custom text
              <input type="text" id="transition-text" placeholder="Breaking news…" />
            </label>
          </div>
          <div class="row">
            <label id="transition-filter-wrap" class="hidden">
              Filter teams
              <input type="text" id="transition-filter" placeholder="Search…" />
            </label>
            <label id="transition-team-wrap" class="hidden">
              Team
              <select id="transition-team"></select>
            </label>
            <label id="transition-color-wrap" class="hidden">
              Color
              <select id="transition-color">
                <option value="primary_color">Primary</option>
                <option value="secondary_color">Secondary</option>
              </select>
            </label>
          </div>
        </div>
      </section>
    </div>

    <script src="./iframe-client.js"></script>
    <script src="./action-network-payload.js"></script>
    <script src="./action-network-app.js"></script>
  </body>
</html>
